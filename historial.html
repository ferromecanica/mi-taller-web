<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Historial | Ferro Mecánica</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Inter:wght@400;700;900&family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --ferro-orange: #E48A06; }
        .bg-ferro { background-color: var(--ferro-orange); }
        .text-ferro { color: var(--ferro-orange); }
        .border-ferro { border-color: var(--ferro-orange); }
        .font-audiowide { font-family: 'Audiowide', cursive; }
        .font-open { font-family: 'Open Sans', sans-serif; }
        
        /* FONDO GRIS OSCURO */
        body { font-family: 'Inter', sans-serif; background-color: #1a1a1a; }

        .hero-overlay {
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(26,26,26,0.7) 50%, rgba(26,26,26,1) 100%);
        }

        .spinner { border: 3px solid rgba(228, 138, 6, 0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: var(--ferro-orange); animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        input {
            background-color: #242424 !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
        }
        input:focus { border-color: var(--ferro-orange) !important; outline: none; }

        /* Estilo para el modelo 3D con transparencia */
        .car-model-overlay {
            opacity: 0.25;
            filter: grayscale(100%) brightness(1.3);
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body class="text-slate-100">

    <nav class="bg-black/95 backdrop-blur-lg border-b border-white/5 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-24 flex items-center justify-between">
            <a href="index.html" class="font-audiowide text-4xl uppercase tracking-tighter">
                <span class="text-ferro">F</span>ERRO
            </a>
            <a href="index.html" class="text-[11px] font-black uppercase tracking-widest text-slate-400 hover:text-ferro transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> Volver al sitio
            </a>
        </div>
    </nav>

    <section class="relative min-h-[55vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 hero-overlay z-10"></div>
            <img src="foto_historial.png" alt="Historial Ferro" class="w-full h-full object-cover">
        </div>

        <div class="relative z-20 w-full max-w-md px-4" id="auth-container">
            <div class="bg-black/60 backdrop-blur-xl p-8 rounded-sm border border-white/10 shadow-2xl">
                <h2 class="font-audiowide text-2xl text-center text-white mb-2 uppercase tracking-tighter">
                    Acceso <span class="text-ferro">Técnico</span>
                </h2>
                <p class="text-[10px] text-center text-slate-400 uppercase tracking-[0.2em] mb-8">Portal de Historial Ferro Mecánica</p>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-[9px] font-black uppercase tracking-widest text-ferro block mb-2">Email del Cliente</label>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" class="w-full rounded-sm px-4 py-3 text-sm transition-all">
                    </div>
                    <div>
                        <label class="text-[9px] font-black uppercase tracking-widest text-ferro block mb-2">Patente del Vehículo</label>
                        <input type="text" id="patente" placeholder="ABC123" class="w-full rounded-sm px-4 py-3 text-sm transition-all uppercase">
                    </div>
                    <button onclick="consultarHistorial()" class="w-full bg-ferro text-black font-black py-4 text-xs uppercase tracking-[0.2em] hover:bg-orange-500 transition-all shadow-xl shadow-orange-900/20 mt-4">
                        INGRESAR AL PORTAL
                    </button>
                    <div id="error-msg" class="hidden text-red-500 text-[11px] text-center mt-4 font-bold bg-red-500/10 p-2 rounded"></div>
                </div>
            </div>
        </div>

        <div id="loader" class="hidden relative z-20 text-center">
            <div class="spinner"></div>
            <p class="text-ferro text-[10px] font-black uppercase tracking-widest mt-4">Sincronizando con el servidor...</p>
        </div>
    </section>

    <main id="resultado" class="hidden max-w-4xl mx-auto px-4 pb-12 relative z-30 -mt-40">
        <div class="bg-[#242424] backdrop-blur-md rounded-sm border border-white/10 p-8 mb-8 border-l-4 border-l-ferro shadow-2xl relative overflow-hidden">
            
            <img id="car-img" src="" class="car-model-overlay absolute right-[-5%] top-[-15%] w-[55%] md:w-[35%] h-auto z-0" style="display: none;">

            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 relative z-10">
                <div>
                    <h3 id="nombre-cliente" class="font-open font-extrabold text-2xl text-white uppercase tracking-tight leading-none"></h3>
                    <p id="datos-auto" class="text-slate-400 font-bold text-sm uppercase tracking-widest mt-3"></p>
                    <div id="smart-service" class="mt-4 inline-block bg-ferro/10 border border-ferro/30 px-3 py-1 rounded-sm text-ferro text-[11px] font-black uppercase tracking-widest">
                        Próximo servicio: <span id="val-smart-service">---</span> KM
                    </div>
                </div>
                <button onclick="location.reload()" class="text-[10px] font-black bg-white/5 border border-white/10 px-6 py-3 hover:bg-white/10 transition-all uppercase tracking-widest self-start md:self-center">
                    Cerrar Sesión
                </button>
            </div>
        </div>
        <div id="lista-ot" class="space-y-6"></div>
    </main>

    <footer class="py-12 border-t border-white/5 text-center">
        <p class="text-[9px] text-slate-600 uppercase tracking-[0.5em]">© 2026 Ferro Mecánica • Rosario, Argentina</p>
    </footer>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxJdvYN-q2_p0mkqQnwx2at9AX-qYippQvASmDwluDOs3j3do76eHjA8zztBwPbZBc/exec";

        // Diccionario de mapeo de modelos
        const carMapping = {
            "Peugeot 206": "peugeot_206.jpg",
            "Chevrolet Agile": "chevrolet_agile.jpg",
            "Renault Clio": "renault_clio.jpg",
            "Fiat Cronos": "fiat_cronos.jpg",
            "Chevrolet Cruze": "chevrolet_cruze.jpg",
            "Nissan Tiida": "nissan_tiida.jpg",
            "Nissan Versa": "nissan_versa.jpg",
            "Renault Sandero Stepway": "renault_sandero_stepway.jpg",
            "Volkswagen Voyage": "volkswage_voyage.jpg"
        };

        async function consultarHistorial() {
            const emailInput = document.getElementById('email').value.trim();
            const patenteInput = document.getElementById('patente').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const loader = document.getElementById('loader');
            const authContainer = document.getElementById('auth-container');
            const resultado = document.getElementById('resultado');

            if (!emailInput || !patenteInput) {
                errorMsg.innerText = "Por favor, complete ambos campos.";
                errorMsg.classList.remove('hidden');
                return;
            }

            errorMsg.classList.add('hidden');
            loader.classList.remove('hidden');
            authContainer.classList.add('hidden');

            try {
                const response = await fetch(`${WEB_APP_URL}?email=${encodeURIComponent(emailInput)}&patente=${encodeURIComponent(patenteInput)}`);
                const data = await response.json();

                loader.classList.add('hidden');

                if (data.error) {
                    errorMsg.innerText = data.error;
                    errorMsg.classList.remove('hidden');
                    authContainer.classList.remove('hidden');
                } else {
                    document.getElementById('nombre-cliente').innerText = data.cliente;
                    document.getElementById('datos-auto').innerText = data.vehiculo;
                    
                    // Lógica de imagen del auto
                    const carImg = document.getElementById('car-img');
                    const fileName = carMapping[data.vehiculo];
                    
                    if (fileName) {
                        carImg.src = `assets/${fileName}`;
                        carImg.onload = () => carImg.style.display = 'block';
                        carImg.onerror = () => carImg.style.display = 'none';
                    } else {
                        carImg.style.display = 'none';
                    }

                    const proximoServiceReciente = data.historial.find(ot => ot.proximo && ot.proximo !== "");
                    document.getElementById('val-smart-service').innerText = proximoServiceReciente ? proximoServiceReciente.proximo : "---";

                    let htmlHistorial = "";
                    if (data.historial.length === 0) {
                        htmlHistorial = '<div class="text-center text-slate-500 py-12 uppercase text-xs tracking-widest font-bold">No se registran servicios cerrados.</div>';
                    } else {
                        data.historial.forEach(ot => {
                            htmlHistorial += `
                                <div class="bg-zinc-900/40 rounded-sm border border-white/5 p-8 group hover:border-ferro/30 transition-all shadow-lg">
                                    <div class="text-ferro font-black text-sm uppercase tracking-[0.2em] mb-6 border-b border-white/5 pb-4">
                                        SERVICIO DEL ${ot.fecha}
                                    </div>
                                    <div class="space-y-3 mb-8">
                                        <p class="text-slate-300 text-sm leading-relaxed"><span class="text-ferro font-black uppercase text-[10px] tracking-widest mr-2">MOTIVO:</span> ${ot.detalle}</p>
                                        <p class="text-slate-300 text-sm"><span class="text-ferro font-black uppercase text-[10px] tracking-widest mr-2">KILOMETRAJE:</span> ${ot.km} KM</p>
                                        <p class="text-slate-300 text-sm"><span class="text-ferro font-black uppercase text-[10px] tracking-widest mr-2">PRÓXIMO SERVICE:</span> ${ot.proximo || "---"} KM</p>
                                    </div>
                                    <div class="flex justify-end pt-4">
                                        ${ot.pdf ? `<a href="${ot.pdf}" target="_blank" class="bg-white/5 border border-ferro text-ferro px-8 py-3 rounded-sm font-black text-[10px] hover:bg-ferro hover:text-black transition-all uppercase tracking-[0.2em] text-center w-full md:w-auto">DESCARGAR REPORTE PDF</a>` : ''}
                                    </div>
                                </div>
                            `;
                        });
                    }
                    document.getElementById('lista-ot').innerHTML = htmlHistorial;
                    resultado.classList.remove('hidden');
                    resultado.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (err) {
                loader.classList.add('hidden');
                authContainer.classList.remove('hidden');
                errorMsg.innerText = "Error de conexión. Intente más tarde.";
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
